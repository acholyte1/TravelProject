<!DOCTYPE html>
<html>
<head>
    <title>Edit Trip</title>
</head>
<body>
    <h1>Edit Trip</h1>

    <p><a href="/trips">Back to Trips</a></p>

    {% if error %}
    <p role="alert">{{ error }}</p>
    {% endif %}

    <form method="post" action="/trips/{{ trip.trip_id }}/edit">
        <p>
            <label for="trip_name">Trip Name</label><br>
            <input type="text" id="trip_name" name="trip_name" maxlength="100" value="{{ form_data.get('trip_name', '') }}" required>
        </p>

        <p>
            <label for="trip_memo">Trip Memo</label><br>
            <textarea id="trip_memo" name="trip_memo" rows="5" cols="50">{{ form_data.get('trip_memo', '') or '' }}</textarea>
        </p>

        <p>
            <label for="in_date">In Date</label><br>
            <input type="date" id="in_date" name="in_date" value="{{ form_data.get('in_date', '') }}" required>
        </p>

        <p>
            <label for="out_date">Out Date</label><br>
            <input type="date" id="out_date" name="out_date" value="{{ form_data.get('out_date', '') }}" required>
        </p>

        <p>Stayed days are calculated automatically.</p>
        <button type="submit">Save</button>
    </form>
</body>
</html>
